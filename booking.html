<!DOCTYPE html>
<html>
<head>
  <title>COM109 Site</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/booking_style.css">
  <link rel="icon" type="image/x-icon" href="images/favicon.ico">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/css/intlTelInput.css"> <!-- style sheet for phone number part --> 
  <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/intlTelInput.min.js"></script> <!-- country dropdown, allows formatting, isValidNumber() -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.19/js/utils.js"></script> <!-- extra stuff that makes it work better -->

  <script src="javascript/booking.js"></script>

</head>

<body>

<!-- Navigation bar --> 
<nav>
  <a href="index.html">Home</a>
  <a href="aboutUs.html">About</a>
  <a href="services.html">Services</a>
  <a href="booking.html">Booking</a>
  <a href="contact.html">Contact</a>
  <a href="faq.html">FAQ</a>
</nav>

<div class="container">
    <h2>Book a Doctor Appointment</h2>
    <form id="bookingForm">

      <label for="name">Full Name*</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Email</label>
      <input type="email" id="email" name="email">

      <label for="phone">Phone Number*</label>
      <input type="tel" id="phone" name="phone" required>

      <label for="doctor">Select Doctor*</label>
      <select id="doctor" name="doctor" required>
        <option value="">-- Choose a Doctor --</option>
        <option value="noPreference">No preference</option>
        <option value="drSarah">Dr. Sarah Doherty - Dermatology</option>
        <option value="drOmar">Dr. Omar Hashim - Oncology</option>
        <option value="drNiamh">Dr. Niamh Cullen - General Practitioner</option>
      </select><br>

      <label for="date">Appointment Date*</label>
      <input type="date" id="date" name="date" required>

      <label for="time">Time*</label>
      <select id="time" name="time" required>
        <option value="">-- Select Time --</option>
      </select>

      <label for="notes">Reason for appointment*</label>
      <textarea id="notes" name="notes" rows="4" maxlength="200" required></textarea>
      <small id="charCount">200 characters remaining</small><br><br>

      <button type="submit">Book Appointment</button>

      <p>Fields marked with * are required</p>
    </form>
</div>

</body>
</html>
